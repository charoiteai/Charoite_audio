# Charoite — конфигурация. Скопируйте в config/config.yaml и подставьте своё.
# Всё работает локально: аудио, распознавание, диаризация, LLM — на вашей машине.

audio:
  device: auto            # auto = микрофон + системный звук (BlackHole, если установлен)
  samplerate: 16000
  chunk_seconds: 3.0
  overlap_seconds: 0.5
  vad_energy_db: -55      # порог тишины; тише — чувствительнее
  record: true            # писать полную запись для оффлайн-пересборки стенограммы
  record_keep_days: 2     # записи удаляются через N дней (приватность)

stt:
  backend: gigaam         # gigaam (русский, быстрый) | parakeet | whisper
  gigaam_model: gigaam-v3-e2e-rnnt
  parakeet_model: mlx-community/parakeet-tdt-0.6b-v3
  whisper_model: mlx-community/whisper-large-v3-turbo
  language: ru

llm:
  base_url: http://localhost:11434   # Ollama
  model: qwen3.6:35b-a3b             # основная модель (подсказки, саммари, имена)
  small_model: gemma4:latest         # лёгкая (живые тезисы, классификация)
  fallback_model: gemma4:latest
  max_context_chars: 6000
  temperature: 0.4
  num_ctx: 8192                      # обязательный: без него KV-кэш раздувается

sufler:
  # --- владелец ---
  user_name: ""           # ваше имя: метка вашего микрофона и обращение в подсказках
  user_context: ""        # 1-2 предложения о вас/вашей работе — контекст для ответов
                          # (например: «Техлид дата-платформы: пайплайны, витрины, LLM.»)

  quiet: true             # тихий режим: фон на лёгкой модели, тяжёлая — точечно
  instant: true           # мгновенный ответ на вопрос собеседника (⚡)
  think_model: qwen3.6:35b-a3b

  # --- граф знаний (опционально; пусто = выключено) ---
  graph_dir: ""           # папка Obsidian-графа, например ~/Documents/Charoite/Work
  default_project: Работа # в какой граф складывать рабочие встречи
  graph_context_chars: 2500
  deja_vu: true           # «⏮ уже обсуждалось DD.MM» — темы из Ядер в тезисах

  # --- облачный слой (опционально; выключите — всё останется локальным) ---
  cloud_enrich: false     # разбор встречи облачным Claude после стопа (нужен claude CLI)
  cloud_model: claude-opus-4-8
  cloud_live: false       # параллельный ответ Claude на вопросы по ходу встречи
  cloud_live_model: claude-haiku-4-5-20251001

  fast_trigger: true      # ранний детект вопросов через стриминговый STT (если поднят)
  live_diarize: true      # живая диаризация «Собеседник 1/2/…»
  live_diarize_threshold: 0.45
  live_dialog_markup: true  # лёгкая модель расставляет реплики внутри абзацев

  # Роль суфлёра: под какие встречи затачивать подсказки. Правьте свободно.
  role: |
    Ты — суфлёр на рабочей встрече. Помогаешь пользователю по живой стенограмме.
    По стенограмме дай КОРОТКО: 1) суть последнего вопроса к пользователю;
    2) готовый ответ от первого лица; 3) что уточнить. По-русски, без воды.
  hotkey_hint: "Enter — подсказка по последним 2 минутам; s — саммари; q — выход"

log:
  transcripts_dir: transcripts
  recordings_dir: recordings
