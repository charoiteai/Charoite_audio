# Автоматический CHANGELOG и версии из conventional commits.
#
# Ничего писать в CHANGELOG.md руками не нужно: action читает fix:/feat:/
# BREAKING-коммиты после каждого пуша в main, копит их в отдельном
# release-PR и при его мёрдже — пишет CHANGELOG, бампает версию, ставит
# git-tag и создаёт GitHub Release. Коммит без conventional-префикса в
# changelog не попадёт, поэтому префиксы обязательны.
#
# Версию release-please хранит в .github/.release-please-manifest.json
# (официальное место — не в корне репозитория). Корень чистый: ни version.txt,
# ни конфигов там нет.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write        # писать CHANGELOG, ставить теги
  pull-requests: write   # вести release-PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT вместо GITHUB_TOKEN: ветку, созданную встроенным токеном бота,
          # GitHub НЕ прогоняет через CI (защита от рекурсии), и release-PR
          # висит BLOCKED без обязательных проверок. Свой токен делает ветку
          # «человеческой» — lint/analyze запускаются сами. Секрет
          # RELEASE_PLEASE_TOKEN задаётся в настройках репозитория;
          # пока его нет — падаем на встроенный токен, чтобы workflow не ломался.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
