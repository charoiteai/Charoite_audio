# Автоматический CHANGELOG и версии из conventional commits.
#
# Ничего писать в CHANGELOG.md руками не нужно: action читает fix:/feat:/
# BREAKING-коммиты после каждого пуша в main, копит их в отдельном
# release-PR и при его мёрдже — пишет CHANGELOG, бампает версию в version.txt,
# ставит git-tag и создаёт GitHub Release. Коммит без conventional-префикса
# в changelog не попадёт, поэтому префиксы обязательны.
#
# Текущую версию release-please берёт из последнего git-тега (v0.1.2 уже
# стоит) — никаких config/manifest-файлов в корне не нужно.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write        # писать CHANGELOG, ставить теги
  pull-requests: write   # вести release-PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # simple: версия живёт в version.txt, changelog в CHANGELOG.md;
          # стартовая точка — тег v0.1.2, дальше нумерует сам
          release-type: simple
