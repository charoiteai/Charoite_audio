# Автоматический CHANGELOG и версии из conventional commits.
#
# Ничего писать в CHANGELOG.md руками не нужно: action читает fix:/feat:/
# BREAKING-коммиты после каждого пуша в main, копит их в отдельном
# release-PR и при его мёрдже — пишет CHANGELOG, бампает версию, ставит
# git-tag и создаёт GitHub Release. Коммит без conventional-префикса в
# changelog не попадёт, поэтому префиксы обязательны.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write        # писать CHANGELOG, ставить теги
  pull-requests: write   # вести release-PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # конфиг и стартовая версия — в файлах рядом, чтобы продолжить с
          # текущей 0.1.2, а не начинать нумерацию заново
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
